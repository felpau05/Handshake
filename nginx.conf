# Reverse proxy in front of the game server. One upstream instance on
# purpose: game rooms are an authoritative in-process state machine (live
# timers + prompt queues), so matches are pinned to a single app container —
# the same reason real game servers pin matches to one host. The scale path
# is the Socket.IO Redis adapter + sticky sessions here, not naive round-robin.
events {}

http {
  upstream game_app {
    server app:3001;
  }

  server {
    listen 80;

    # Socket.IO's HTTP long-polling fallback POSTs the whole packet as a
    # request body — word submissions carry up to ~20 small letter-capture
    # JPEGs, so the 1m nginx default would reject them before the app's own
    # 8MB socket buffer limit ever applied.
    client_max_body_size 16m;

    location / {
      proxy_pass http://game_app;
      proxy_http_version 1.1;
      # WebSocket upgrade for Socket.IO.
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # Long-lived game sockets; don't sever them at nginx's 60s default.
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
    }
  }
}
